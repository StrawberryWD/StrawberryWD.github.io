<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具集</title>
  <style>
    :root {
      --bg-top: #eaf6ff;
      --bg-bottom: #ffeaf2;
      --bg: #f4f7ff;
      --surface: rgba(255, 255, 255, 0.86);
      --text: #101828;
      --muted: #5f6b80;
      --blue: #4f7cff;
      --indigo: #6e5bff;
      --cyan: #2ec7ff;
      --pink: #ff5fa2;
      --orange: #ff8b3d;
      --green: #2fcf79;
      --border: rgba(255, 255, 255, 0.6);
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.13);
    }

    body.theme-pink {
      --bg-top: #fff2f7;
      --bg-bottom: #eaf6ff;
      --blue: #ff6f91;
      --indigo: #3f7cff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Source Han Serif SC", "Noto Serif SC", "Songti SC", "SimSun", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 124, 255, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 95, 162, 0.14), transparent 30%),
        linear-gradient(135deg, #f7f9ff, #eef6ff);
      padding: 24px;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background: rgba(79, 124, 255, 0.2);
      top: -100px;
      left: -60px;
    }

    body::after {
      background: rgba(46, 199, 255, 0.2);
      right: -90px;
      bottom: -80px;
    }

    .topbar {
      position: relative;
      z-index: 1;
      max-width: 1240px;
      margin: 0 auto 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .theme-switch { display: flex; gap: 8px; }
    .theme-switch button, .topbar a {
      border: none;
      cursor: pointer;
      font: inherit;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      color: var(--text);
      border: 1px solid rgba(15, 23, 42, 0.08);
      text-decoration: none;
    }
    .theme-switch button.active {
      background: var(--blue);
      color: white;
    }

    .shell {
      position: relative;
      z-index: 1;
      max-width: 1240px;
      margin: 0 auto;
    }

    .hero {
      position: relative;
      background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(242,247,255,0.8));
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 30px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: -30px auto auto -30px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 124, 255, 0.15), transparent 70%);
      pointer-events: none;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(79, 124, 255, 0.1);
      border: 1px solid rgba(79, 124, 255, 0.16);
      color: var(--blue);
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 3vw, 2.7rem);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      max-width: 620px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .hero-actions a {
      text-decoration: none;
      padding: 11px 16px;
      border-radius: 999px;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .hero-actions a:hover {
      transform: translateY(-2px);
    }

    .primary {
      color: white;
      background: linear-gradient(135deg, var(--blue), var(--indigo));
      box-shadow: 0 10px 28px rgba(79, 124, 255, 0.24);
    }

    .secondary {
      color: var(--text);
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .hero-panel {
      background: linear-gradient(135deg, #111827, #243449);
      border-radius: 24px;
      padding: 20px;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      min-height: 240px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .panel-chip {
      display: inline-flex;
      width: fit-content;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 0.82rem;
      color: #dbeafe;
    }

    .panel-list {
      display: grid;
      gap: 10px;
      font-size: 0.95rem;
      color: #e2e8f0;
    }

    .panel-list span {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
    }

    .section-title {
      margin: 26px 0 12px;
      font-size: 1.05rem;
      font-weight: 700;
      color: #273449;
    }

    .page-title {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .page-title h2 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }

    .tool-card {
      display: block;
      position: relative;
      text-decoration: none;
      color: inherit;
      padding: 18px 22px;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
      min-height: auto;
    }

    .tool-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 44px rgba(15, 23, 42, 0.12);
    }

    .tool-card .icon {
      font-size: 1.8rem;
      margin-bottom: 14px;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      color: white;
    }

    .tool-card h3 {
      margin: 0 0 8px;
      font-size: 1.06rem;
    }

    .tool-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.94rem;
    }

    .tool-card .tag {
      display: inline-flex;
      margin-top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      background: rgba(15, 23, 42, 0.06);
      color: #475569;
    }

    .tool-card::after {
      content: "";
      position: absolute;
      inset: auto -30px -30px auto;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.45), transparent 70%);
      pointer-events: none;
    }

    .card-ai .icon { background: linear-gradient(135deg, var(--blue), var(--cyan)); }
    .card-color .icon { background: linear-gradient(135deg, var(--orange), var(--pink)); }
    .card-text .icon { background: linear-gradient(135deg, var(--green), var(--cyan)); }
    .card-notes .icon { background: linear-gradient(135deg, var(--pink), var(--indigo)); }
    .card-timer .icon { background: linear-gradient(135deg, var(--indigo), var(--blue)); }
    .card-chat .icon { background: linear-gradient(135deg, var(--cyan), var(--indigo)); }

    @media (max-width: 960px) {
      .hero { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
      .hero { padding: 20px; border-radius: 24px; }
      .grid { grid-template-columns: 1fr; }
      .tool-card { min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="page-title">
      <div class="pill">✨ 轻量工具集</div>
      <h2>选择工具，马上开始</h2>
    </div>
    <div class="theme-switch" role="toolbar" aria-label="主题切换">
      <button class="active" data-theme="sky" onclick="setTheme('sky')">天蓝</button>
      <button data-theme="pink" onclick="setTheme('pink')">浅粉</button>
    </div>
  </div>

  <div class="shell">
    <div class="grid">
      <a class="tool-card card-ai" href="tools/ai.html">
        <h3>AI 创作台</h3>
        <p>适合生成图片与视频。</p>
        <div class="tag">智能创作</div>
      </a>

      <a class="tool-card card-chat" href="tools/chat.html">
        <h3>AI 对话</h3>
        <p>由 Agnes 2.0 Flash 驱动的聊天助手，自行输入 API Key 即可使用。</p>
        <div class="tag">智能对话</div>
      </a>

      <a class="tool-card card-color" href="tools/color.html">
        <h3>调色灵感</h3>
        <p>快速生成一组适合 UI、海报和品牌的配色。</p>
        <div class="tag">视觉设计</div>
      </a>

      <a class="tool-card card-text" href="tools/text.html">
        <h3>文本助手</h3>
        <p>帮你检查字数、段落和内容长度，适合写作与整理。</p>
        <div class="tag">内容处理</div>
      </a>

      <a class="tool-card card-notes" href="tools/notes.html">
        <h3>待办清单</h3>
        <p>支持优先级、截止日期、筛选与搜索，页面刷新后仍可保留。</p>
        <div class="tag">效率管理</div>
      </a>
      
        <a class="tool-card card-timer" href="tools/timer.html">
          <h3>计时器</h3>
          <p>专注计时、倒计时与秒表功能。</p>
          <div class="tag">时间管理</div>
        </a>
    </div>
  </div>
  <script>
    function setTheme(theme) {
      document.body.classList.toggle('theme-pink', theme === 'pink');
      document.querySelectorAll('.theme-switch button').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
      localStorage.setItem('site-theme', theme);
    }
    const savedTheme = localStorage.getItem('site-theme') || 'sky';
    setTheme(savedTheme);
  </script>
</body>
</html>
