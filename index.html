<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在线时钟</title>
  <style>
    :root {
      --bg1: #f0f9ff;
      --bg2: #e0f2fe;
      --accent: #38bdf8;
      --accent2: #60a5fa;
      --text: #0f172a;
      --muted: #475569;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.24), transparent 28%),
        radial-gradient(circle at bottom right, rgba(96,165,250,0.22), transparent 34%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: absolute;
      inset: auto;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.45;
      animation: float 8s ease-in-out infinite;
      pointer-events: none;
    }

    body::before {
      background: rgba(56, 189, 248, 0.22);
      top: -80px;
      left: -40px;
    }

    body::after {
      background: rgba(96, 165, 250, 0.2);
      bottom: -60px;
      right: -30px;
      animation-delay: -3s;
    }

    .clock-card {
      position: relative;
      width: min(92vw, 620px);
      padding: 36px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(56, 189, 248, 0.16);
      box-shadow: 0 20px 60px rgba(14, 116, 144, 0.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: center;
      overflow: hidden;
    }

    .clock-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.7), transparent 45%, rgba(56,189,248,0.08));
      pointer-events: none;
    }

    .label {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #0369a1;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.2);
      margin-bottom: 18px;
    }

    .time {
      font-size: clamp(3rem, 7vw, 5.8rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin: 8px 0 10px;
      text-shadow: 0 0 24px rgba(56, 189, 248, 0.28);
    }

    .date {
      font-size: 1.05rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 9px 14px;
      background: rgba(224, 242, 254, 0.8);
      color: #334155;
      font-size: 0.95rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 10px #22c55e;
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-20px) translateX(12px); }
    }
  </style>
</head>
<body>
  <div class="clock-card">
    <div class="label">当前时间</div>
    <div id="time" class="time">--:--:--</div>
    <div id="date" class="date">--</div>
    <div class="status">
      <span class="dot"></span>
      <span id="statusText">实时同步中</span>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const timeEl = document.getElementById('time');
      const dateEl = document.getElementById('date');
      const statusEl = document.getElementById('statusText');

      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');

      timeEl.textContent = `${h}:${m}:${s}`;

      const date = now.toLocaleDateString('zh-CN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        weekday: 'long'
      });
      dateEl.textContent = date;

      statusEl.textContent = `已同步 ${h}:${m}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
