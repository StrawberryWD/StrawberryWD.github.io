<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 对话</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

  :root {
    --bg-top: #eaf6ff;
    --bg-bottom: #ffeaf2;
    --bg:       #f5f7fb;
    --surface:  #ffffff;
    --panel:    #f8faff;
    --border:   #dfe4ee;
    --border2:  #cfd8e6;
    --text:     #172033;
    --muted:    #64748b;
    --accent:   #5b6cff;
    --accent2:  #7c93ff;
    --green:    #16a34a;
    --red:      #dc2626;
    --amber:    #d97706;
    --radius:   12px;
    --radius-sm:8px;
  }

  body.theme-pink {
    --bg-top: #fff2f7;
    --bg-bottom: #eaf6ff;
    --accent: #ff6f91;
    --accent2: #3f7cff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Han Serif SC', 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
    background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .theme-switch { display: flex; gap: 8px; }
  .theme-switch button, .topbar a {
    border: none;
    cursor: pointer;
    font: inherit;
    padding: 8px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.9);
    color: var(--text);
    border: 1px solid var(--border);
    text-decoration: none;
  }
  .theme-switch button.active { background: var(--accent); color: white; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,.9);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 50;
    gap: 12px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.15rem; font-weight: 700; letter-spacing: -.02em;
  }
  .logo-dot {
    width: 28px; height: 28px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .logo span { color: var(--muted); font-weight: 400; }

  .api-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .api-label { font-size: .75rem; color: var(--muted); }
  #api-key-input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 7px 12px;
    border-radius: var(--radius-sm); font-size: .8rem;
    width: 220px; outline: none;
    font-family: 'Space Grotesk', monospace;
    transition: border .2s;
  }
  #api-key-input:focus { border-color: var(--accent); }
  #api-key-input::placeholder { color: var(--muted); }

  .status-pill {
    padding: 4px 10px; border-radius: 99px;
    font-size: .72rem; font-weight: 500;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); white-space: nowrap;
    transition: all .3s;
  }
  .status-pill.ok   { border-color: var(--green); color: var(--green); background: rgba(52,211,153,.08); }
  .status-pill.err  { border-color: var(--red);   color: var(--red);   background: rgba(248,113,113,.08); }
  .status-pill.busy { border-color: var(--amber);  color: var(--amber);  background: rgba(251,191,36,.08); }

  /* ── Main layout ── */
  .workspace {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
    height: calc(100vh - 65px);
  }

  /* ── Conversation list section (top of sidebar) ── */
  .conv-section {
    display: flex;
    flex-direction: column;
    border-bottom: 1px solid var(--border);
    flex: 0 0 auto;
    max-height: 45%;
  }

  .conv-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px 8px;
  }
  .conv-header-title {
    font-size: .72rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
  }
  .new-conv-btn {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface);
    color: var(--accent); font-size: .75rem; font-weight: 600;
    cursor: pointer; transition: all .2s;
    font-family: inherit;
  }
  .new-conv-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

  .conv-list {
    overflow-y: auto;
    padding: 4px 10px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .conv-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .15s;
    min-width: 0;
  }
  .conv-item:hover { background: var(--panel); }
  .conv-item.active {
    background: rgba(91,108,255,.1);
    outline: 1px solid rgba(91,108,255,.2);
  }

  .conv-icon {
    font-size: .9rem;
    flex-shrink: 0;
    opacity: .6;
  }

  .conv-name {
    flex: 1;
    font-size: .82rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .conv-item.active .conv-name { color: var(--accent); font-weight: 600; }

  .conv-name-input {
    flex: 1;
    font-size: .82rem;
    border: 1px solid var(--accent);
    border-radius: 4px;
    padding: 2px 6px;
    outline: none;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    min-width: 0;
  }

  .conv-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity .15s;
  }
  .conv-item:hover .conv-actions,
  .conv-item.active .conv-actions { opacity: 1; }

  .conv-action-btn {
    display: flex; align-items: center; justify-content: center;
    width: 22px; height: 22px;
    border: none; background: none;
    cursor: pointer; border-radius: 4px;
    font-size: .8rem; color: var(--muted);
    transition: background .15s, color .15s;
  }
  .conv-action-btn:hover { background: var(--border); color: var(--text); }
  .conv-action-btn.del:hover { background: rgba(220,38,38,.12); color: var(--red); }

  .conv-empty {
    padding: 12px 20px;
    font-size: .8rem;
    color: var(--muted);
    text-align: center;
  }

  /* ── Settings section (bottom of sidebar) ── */
  .settings-section {
    overflow-y: auto;
    flex: 1;
  }

  .section { padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .section-title {
    font-size: .72rem; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px;
  }

  label { font-size: .8rem; color: var(--muted); display: block; margin-bottom: 5px; }

  textarea, select, input[type=number], input[type=text] {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius-sm); font-size: .82rem;
    font-family: inherit; outline: none; transition: border .2s;
  }
  textarea:focus, select:focus, input:focus { border-color: var(--accent); }

  textarea {
    padding: 10px 12px; resize: vertical; min-height: 90px;
    line-height: 1.5;
  }
  select, input[type=number] { padding: 8px 10px; }

  .slider-row { display: flex; align-items: center; gap: 10px; }
  input[type=range] {
    flex: 1; -webkit-appearance: none; height: 4px;
    border-radius: 99px; background: var(--border); cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--accent); border: none;
  }
  .slider-val {
    min-width: 38px; text-align: right;
    font-size: .8rem; color: var(--accent2);
    font-family: 'Space Grotesk', sans-serif;
  }

  .clear-btn {
    width: 100%; margin-top: 4px;
    padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--muted); font-size: .82rem;
    cursor: pointer; transition: all .2s;
    font-family: inherit;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  .hint {
    font-size: .74rem; color: var(--muted); line-height: 1.6; margin-top: 10px;
  }
  .hint a { color: var(--accent2); }

  /* ── Chat pane ── */
  .chat-pane {
    display: flex; flex-direction: column;
    height: calc(100vh - 65px); overflow: hidden;
  }

  .chat-toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .chat-toolbar-title { font-size: .82rem; font-weight: 600; flex: 1; }

  .chat-body {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .msg { max-width: 76%; display: flex; flex-direction: column; gap: 6px; animation: fadeUp .3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .msg-role { font-size: .7rem; color: var(--muted); padding: 0 4px; }
  .msg-bubble {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: .92rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); border-bottom-left-radius: 4px;
  }
  .msg.assistant .msg-bubble.err { border-color: var(--red); color: var(--red); background: rgba(248,113,113,.06); }
  .msg-bubble .typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin-right: 3px; animation: blink 1.2s infinite; }
  .msg-bubble .typing-dot:nth-child(2) { animation-delay: .2s; }
  .msg-bubble .typing-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }

  /* Empty state */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); text-align: center; gap: 12px;
  }
  .empty-icon { font-size: 3rem; opacity: .3; }
  .empty-title { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; }
  .empty-sub { font-size: .8rem; max-width: 320px; line-height: 1.6; }

  /* Composer */
  .composer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 14px 20px;
    display: flex; gap: 10px; align-items: flex-end;
  }
  .composer textarea {
    flex: 1; min-height: 46px; max-height: 160px;
    padding: 12px 14px;
  }
  .send-btn {
    padding: 12px 20px; border: none; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent), #9f8bf8);
    color: #fff; font-size: .88rem; font-weight: 600;
    cursor: pointer; transition: all .25s;
    font-family: 'Space Grotesk', sans-serif;
    white-space: nowrap;
    box-shadow: 0 4px 24px rgba(124,109,250,.3);
  }
  .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 30px rgba(124,109,250,.4); }
  .send-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px);
    padding: 10px 18px; border-radius: var(--radius);
    font-size: .82rem; font-weight: 500;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); opacity: 0; transition: all .3s;
    pointer-events: none; z-index: 999;
    backdrop-filter: blur(10px);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.err  { border-color: var(--red);   color: var(--red); }
  #toast.ok   { border-color: var(--green); color: var(--green); }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

  .return-home {
    padding: 16px 24px 24px;
    text-align: center;
  }
  .return-home a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-radius: 999px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    text-decoration: none;
    font-size: .85rem;
    font-weight: 600;
    box-shadow: 0 6px 18px rgba(91,108,255,.12);
    transition: transform .2s, box-shadow .2s;
  }
  .return-home a:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 22px rgba(91,108,255,.18);
  }

  @media (max-width: 800px) {
    .workspace { grid-template-columns: 1fr; }
    .sidebar { height: auto; max-height: 50vh; }
    .conv-section { max-height: 50%; }
    .chat-pane { height: auto; }
    .msg { max-width: 90%; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">AI 对话</div>
  <div class="theme-switch" role="toolbar" aria-label="主题切换">
    <button class="active" data-theme="sky" onclick="setTheme('sky')">天蓝</button>
    <button data-theme="pink" onclick="setTheme('pink')">浅粉</button>
  </div>
  <a href="../index.html">← 返回主页</a>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-dot">✦</div>
    Agnes <span>Chat</span>
  </div>
  <div class="api-row">
    <span class="api-label">API Key</span>
    <input id="api-key-input" type="password" placeholder="sk-..." autocomplete="off">
    <div id="status-pill" class="status-pill">未配置</div>
  </div>
</header>

<div class="workspace">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <!-- 对话列表 -->
    <div class="conv-section">
      <div class="conv-header">
        <div class="conv-header-title">历史对话</div>
        <button class="new-conv-btn" onclick="newConversation()">＋ 新建</button>
      </div>
      <div class="conv-list" id="conv-list">
        <div class="conv-empty">暂无对话记录</div>
      </div>
    </div>

    <!-- 设置项 -->
    <div class="settings-section">
      <div class="section">
        <div class="section-title">模型</div>
        <select id="chat-model">
          <option value="agnes-2.0-flash">agnes-2.0-flash</option>
        </select>
        <div class="hint">
          由 Agnes 2.0 Flash 驱动。
          API Key 只保存在你当前的浏览器标签页内，不会被写入本站或上传到任何地方。
        </div>
      </div>

      <div class="section">
        <div class="section-title">系统提示词</div>
        <label>可选，用来设定对话的角色或风格</label>
        <textarea id="system-prompt" placeholder="例如：你是一个简洁、友善的中文助手。"></textarea>
      </div>

      <div class="section">
        <div class="section-title">生成参数</div>
        <label>Temperature</label>
        <div class="slider-row">
          <input type="range" id="temperature" min="0" max="1.5" step="0.1" value="0.7"
            oninput="document.getElementById('temp-val').textContent = this.value">
          <span class="slider-val" id="temp-val">0.7</span>
        </div>
      </div>

      <div class="section">
        <button class="clear-btn" onclick="clearCurrentChat()">清空当前对话</button>
      </div>
    </div>

  </aside>

  <!-- ── Chat pane ── -->
  <div class="chat-pane">
    <div class="chat-toolbar">
      <div class="chat-toolbar-title" id="chat-toolbar-title">与 Agnes 2.0 Flash 对话</div>
    </div>

    <div class="chat-body" id="chat-body">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✦</div>
        <div class="empty-title">还没有对话</div>
        <div class="empty-sub">点击左侧「＋ 新建」创建对话，或输入 API Key 后直接发送消息。</div>
      </div>
    </div>

    <div class="composer">
      <textarea id="chat-input" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行…"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<div class="return-home">
  <a href="../index.html">← 返回主页</a>
</div>

<script>
/* ════════════════════════════════════════════
   Storage keys & helpers
══════════════════════════════════════════════ */
const STORAGE_CONV_LIST = 'agnes-conv-list-v1';   // 对话元数据列表
const STORAGE_CONV_MSG  = 'agnes-conv-msg-v1-';   // 每条对话的消息（前缀 + id）

const API_BASE = 'https://apihub.agnes-ai.com';
let busy = false;

// 当前激活的对话 id
let activeConvId = null;
// 当前对话的消息列表（内存）
let history = [];

/* ── 对话元数据 { id, name, createdAt, updatedAt } ── */
function loadConvList() {
  try {
    const raw = localStorage.getItem(STORAGE_CONV_LIST);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveConvList(list) {
  localStorage.setItem(STORAGE_CONV_LIST, JSON.stringify(list));
}

function loadConvMessages(id) {
  try {
    const raw = localStorage.getItem(STORAGE_CONV_MSG + id);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function saveConvMessages(id, messages) {
  localStorage.setItem(STORAGE_CONV_MSG + id, JSON.stringify(messages));
}

function deleteConvMessages(id) {
  localStorage.removeItem(STORAGE_CONV_MSG + id);
}

/* ════════════════════════════════════════════
   Conversation management
══════════════════════════════════════════════ */
function newConversation() {
  const list = loadConvList();
  const id = 'conv-' + Date.now();
  const name = '新对话 ' + (list.length + 1);
  const now = new Date().toISOString();
  list.unshift({ id, name, createdAt: now, updatedAt: now });
  saveConvList(list);
  switchConversation(id);
  renderConvList();
}

function switchConversation(id) {
  activeConvId = id;
  history = loadConvMessages(id);
  renderChatBody();
  updateToolbarTitle();
  renderConvList(); // 更新选中态
}

function renameConversation(id, newName) {
  const list = loadConvList();
  const conv = list.find(c => c.id === id);
  if (conv) {
    conv.name = newName.trim() || conv.name;
    conv.updatedAt = new Date().toISOString();
    saveConvList(list);
  }
  updateToolbarTitle();
}

function deleteConversation(id) {
  let list = loadConvList();
  list = list.filter(c => c.id !== id);
  saveConvList(list);
  deleteConvMessages(id);

  if (activeConvId === id) {
    // 切换到下一条或清空
    if (list.length > 0) {
      switchConversation(list[0].id);
    } else {
      activeConvId = null;
      history = [];
      renderChatBody();
      updateToolbarTitle();
    }
  }
  renderConvList();
}

/* ════════════════════════════════════════════
   Sidebar rendering
══════════════════════════════════════════════ */
function renderConvList() {
  const list = loadConvList();
  const container = document.getElementById('conv-list');

  if (!list.length) {
    container.innerHTML = '<div class="conv-empty">暂无对话记录</div>';
    return;
  }

  container.innerHTML = list.map(conv => `
    <div class="conv-item ${conv.id === activeConvId ? 'active' : ''}"
         id="conv-item-${conv.id}"
         onclick="handleConvClick('${conv.id}', event)">
      <span class="conv-icon">💬</span>
      <span class="conv-name" id="conv-name-${conv.id}">${escapeHtml(conv.name)}</span>
      <div class="conv-actions">
        <button class="conv-action-btn" title="重命名"
          onclick="startRename('${conv.id}', event)">✏️</button>
        <button class="conv-action-btn del" title="删除"
          onclick="confirmDelete('${conv.id}', event)">🗑</button>
      </div>
    </div>
  `).join('');
}

function handleConvClick(id, e) {
  // 如果点的是操作按钮则不切换
  if (e.target.closest('.conv-action-btn')) return;
  if (id === activeConvId) return;
  switchConversation(id);
}

let renamingId = null;

function startRename(id, e) {
  e.stopPropagation();
  if (renamingId) cancelRename();
  renamingId = id;

  const list = loadConvList();
  const conv = list.find(c => c.id === id);
  if (!conv) return;

  const nameEl = document.getElementById('conv-name-' + id);
  const input = document.createElement('input');
  input.className = 'conv-name-input';
  input.value = conv.name;
  input.onclick = e => e.stopPropagation();
  input.onkeydown = e => {
    if (e.key === 'Enter') { e.preventDefault(); commitRename(id, input.value); }
    if (e.key === 'Escape') cancelRename();
  };
  input.onblur = () => commitRename(id, input.value);
  nameEl.replaceWith(input);
  input.focus();
  input.select();
}

function commitRename(id, value) {
  renamingId = null;
  renameConversation(id, value);
  renderConvList();
}

function cancelRename() {
  renamingId = null;
  renderConvList();
}

function confirmDelete(id, e) {
  e.stopPropagation();
  const list = loadConvList();
  const conv = list.find(c => c.id === id);
  if (!conv) return;
  if (confirm(`确认删除对话「${conv.name}」？此操作不可恢复。`)) {
    deleteConversation(id);
  }
}

function updateToolbarTitle() {
  const titleEl = document.getElementById('chat-toolbar-title');
  if (!activeConvId) {
    titleEl.textContent = '与 Agnes 2.0 Flash 对话';
    return;
  }
  const list = loadConvList();
  const conv = list.find(c => c.id === activeConvId);
  titleEl.textContent = conv ? conv.name : '与 Agnes 2.0 Flash 对话';
}

/* ════════════════════════════════════════════
   Config & state
══════════════════════════════════════════════ */
function getKey() {
  return document.getElementById('api-key-input').value.trim();
}
function setStatus(s) {
  const el = document.getElementById('status-pill');
  el.className = 'status-pill' + (s ? ` ${s}` : '');
  el.textContent = { ok: '✓ 就绪', err: '✗ 错误', busy: '⟳ 思考中', '': '未配置' }[s] || '';
}

function setTheme(theme) {
  document.body.classList.toggle('theme-pink', theme === 'pink');
  document.querySelectorAll('.theme-switch button').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
  localStorage.setItem('site-theme', theme);
}
setTheme(localStorage.getItem('site-theme') || 'sky');

document.getElementById('api-key-input').addEventListener('input', () => {
  setStatus(getKey() ? 'ok' : '');
});

const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('input', () => {
  chatInput.style.height = 'auto';
  chatInput.style.height = Math.min(chatInput.scrollHeight, 160) + 'px';
});
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

/* ════════════════════════════════════════════
   Chat body rendering
══════════════════════════════════════════════ */
function renderChatBody() {
  const body = document.getElementById('chat-body');

  if (!history.length) {
    body.innerHTML = `<div class="empty-state" id="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-title">还没有对话</div>
      <div class="empty-sub">输入消息，按 Enter 发送即可开始。</div>
    </div>`;
    return;
  }

  body.innerHTML = '';
  history.forEach(msg => {
    const wrap = document.createElement('div');
    wrap.className = `msg ${msg.role}`;
    wrap.innerHTML = `
      <div class="msg-role">${msg.role === 'user' ? '你' : 'Agnes'}</div>
      <div class="msg-bubble">${escapeHtml(msg.content)}</div>
    `;
    body.appendChild(wrap);
  });
  body.scrollTop = body.scrollHeight;
}

function hideEmpty() {
  const el = document.getElementById('empty-state');
  if (el) el.remove();
}

function escapeHtml(text) {
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function addMessage(role, content) {
  hideEmpty();
  const body = document.getElementById('chat-body');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  wrap.innerHTML = `
    <div class="msg-role">${role === 'user' ? '你' : 'Agnes'}</div>
    <div class="msg-bubble">${escapeHtml(content)}</div>
  `;
  body.appendChild(wrap);
  body.scrollTop = body.scrollHeight;
  return wrap.querySelector('.msg-bubble');
}

function addTypingBubble() {
  hideEmpty();
  const body = document.getElementById('chat-body');
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant';
  wrap.innerHTML = `
    <div class="msg-role">Agnes</div>
    <div class="msg-bubble"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
  `;
  body.appendChild(wrap);
  body.scrollTop = body.scrollHeight;
  return wrap.querySelector('.msg-bubble');
}

function clearCurrentChat() {
  if (!activeConvId) { toast('请先选择或新建一个对话', 'err'); return; }
  if (!confirm('确认清空当前对话的所有消息？')) return;
  history = [];
  saveConvMessages(activeConvId, history);
  renderChatBody();
}

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3200);
}

/* ════════════════════════════════════════════
   Auto-name: 用第一条用户消息的前 12 字作为对话名
══════════════════════════════════════════════ */
function autoNameConvIfNew(text) {
  const list = loadConvList();
  const conv = list.find(c => c.id === activeConvId);
  if (!conv) return;
  // 如果名字还是默认"新对话 N"，就自动重命名
  if (/^新对话\s*\d*$/.test(conv.name)) {
    conv.name = text.slice(0, 12) + (text.length > 12 ? '…' : '');
    conv.updatedAt = new Date().toISOString();
    saveConvList(list);
    renderConvList();
    updateToolbarTitle();
  }
}

/* ════════════════════════════════════════════
   Sending messages
══════════════════════════════════════════════ */
function setBusy(v) {
  busy = v;
  document.getElementById('send-btn').disabled = v;
  setStatus(v ? 'busy' : (getKey() ? 'ok' : ''));
}

async function sendMessage() {
  if (busy) return;
  const key = getKey();
  if (!key) { toast('请先输入 API Key', 'err'); return; }

  const text = chatInput.value.trim();
  if (!text) return;

  // 若没有激活对话则自动新建
  if (!activeConvId) newConversation();

  chatInput.value = '';
  chatInput.style.height = 'auto';
  addMessage('user', text);
  history.push({ role: 'user', content: text });

  // 自动命名
  if (history.filter(m => m.role === 'user').length === 1) {
    autoNameConvIfNew(text);
  }

  const model = document.getElementById('chat-model').value;
  const systemPrompt = document.getElementById('system-prompt').value.trim();
  const temperature = parseFloat(document.getElementById('temperature').value);

  const messages = [];
  if (systemPrompt) messages.push({ role: 'system', content: systemPrompt });
  messages.push(...history);

  setBusy(true);
  const bubble = addTypingBubble();

  try {
    const res = await fetch(`${API_BASE}/v1/chat/completions`, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${key}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model,
        messages,
        temperature,
        stream: false
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

    const reply = data.choices?.[0]?.message?.content;
    if (!reply) throw new Error('返回内容为空');

    bubble.textContent = reply;
    history.push({ role: 'assistant', content: reply });

    // 持久化保存
    saveConvMessages(activeConvId, history);
    // 更新对话的 updatedAt
    const list = loadConvList();
    const conv = list.find(c => c.id === activeConvId);
    if (conv) { conv.updatedAt = new Date().toISOString(); saveConvList(list); }

    setStatus('ok');
  } catch (e) {
    bubble.classList.add('err');
    bubble.textContent = '出错了：' + e.message;
    setStatus('err');
    toast('请求失败：' + e.message, 'err');
  } finally {
    setBusy(false);
    const body = document.getElementById('chat-body');
    body.scrollTop = body.scrollHeight;
  }
}

/* ════════════════════════════════════════════
   Init
══════════════════════════════════════════════ */
(function init() {
  renderConvList();
  // 自动打开最近一条对话
  const list = loadConvList();
  if (list.length > 0) {
    switchConversation(list[0].id);
  }
})();
</script>
