<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大屏文字显示</title>
    <style>
        /* 全局样式重置 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
        }

        /* ========== 输入界面样式 ========== */
        #input-view {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f7f7;
        }
        
        #text-input {
            font-size: 24px;
            padding: 15px 25px;
            border: 2px solid #ccc;
            border-radius: 12px;
            width: 80%;
            max-width: 600px;
            text-align: center;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        #text-input:focus {
            border-color: #000;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .hint {
            margin-top: 15px;
            color: #666;
            font-size: 16px;
        }

        /* ========== 大屏显示界面样式 ========== */
        #display-view {
            display: none; /* 初始隐藏 */
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff; /* 白底 */
        }

        #text-container {
            flex: 1; /* 占据剩余的所有空间 */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            overflow: hidden;
        }

        #big-text {
            color: #000000; /* 黑色字 */
            font-weight: bold; /* 粗体 */
            text-align: center;
            line-height: 1.1;
            /* 允许长单词换行 */
            overflow-wrap: break-word;
            word-wrap: break-word;
            max-width: 100%;
            display: inline-block;
        }

        /* 底部按钮区域 */
        #btn-container {
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
        }

        #again-btn {
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 30px;
            transition: transform 0.1s, background-color 0.3s;
        }

        #again-btn:hover {
            background-color: #333333;
        }
        
        #again-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <a href="../index.html" style="position:fixed;top:12px;left:12px;z-index:999;background:rgba(255,255,255,0.9);padding:6px 10px;border-radius:8px;border:1px solid #e6e6e6;text-decoration:none;color:#000;font-size:14px">返回首页</a>

    <!-- 输入视图 -->
    <div id="input-view">
        <input type="text" id="text-input" placeholder="输入要大屏显示的字..." autocomplete="off">
        <div class="hint">输入后按回车键 (Enter)</div>
    </div>

    <!-- 大屏显示视图 -->
    <div id="display-view">
        <div id="text-container">
            <div id="big-text"></div>
        </div>
        <div id="btn-container">
            <button id="again-btn">Again</button>
        </div>
    </div>

    <script>
        // 获取 DOM 元素
        const inputView = document.getElementById('input-view');
        const displayView = document.getElementById('display-view');
        const textInput = document.getElementById('text-input');
        const bigText = document.getElementById('big-text');
        const againBtn = document.getElementById('again-btn');
        const textContainer = document.getElementById('text-container');

        // 页面加载时自动聚焦输入框
        window.onload = () => textInput.focus();

        // 监听输入框的回车事件
        textInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const text = textInput.value.trim();
                if (text) {
                    showBigText(text);
                }
            }
        });

        // 监听 Again 按钮点击事件
        againBtn.addEventListener('click', function () {
            displayView.style.display = 'none';
            inputView.style.display = 'flex';
            textInput.value = '';
            textInput.focus();
        });

        // 切换到大屏显示并计算字体
        function showBigText(text) {
            bigText.innerText = text;
            inputView.style.display = 'none';
            displayView.style.display = 'flex';
            
            // 计算最合适的字体大小
            adjustFontSize();
        }

        // 核心算法：使用二分查找法计算不溢出容器的最大字体大小
        function adjustFontSize() {
            let minFontSize = 10;   // 最小字体 10px
            let maxFontSize = 2000; // 最大字体 2000px
            let midFontSize;
            
            // 容器最大可用宽高
            const maxWidth = textContainer.clientWidth;
            const maxHeight = textContainer.clientHeight; 

            // 在一瞬间循环测算，用户感知不到闪烁
            while (minFontSize <= maxFontSize) {
                midFontSize = Math.floor((minFontSize + maxFontSize) / 2);
                bigText.style.fontSize = midFontSize + 'px';

                // 判断当前字体大小是否超出了容器限制
                if (bigText.scrollWidth <= maxWidth && bigText.scrollHeight <= maxHeight) {
                    // 没有超出，说明可以尝试更大的字体
                    minFontSize = midFontSize + 1;
                } else {
                    // 超出了容器，需要缩小字体
                    maxFontSize = midFontSize - 1;
                }
            }

            // 循环结束后，maxFontSize 即为能塞进容器的最大字号
            bigText.style.fontSize = maxFontSize + 'px';
        }

        // 监听窗口大小改变，防抖重新计算大小以保持自适应
        let resizeTimer;
        window.addEventListener('resize', function () {
            if (displayView.style.display === 'flex') {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(adjustFontSize, 100);
            }
        });
    </script>
</body>
</html>
