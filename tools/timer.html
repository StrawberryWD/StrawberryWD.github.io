<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>计时器</title>
  <style>
    :root {
      --bg-top: #eaf6ff;
      --bg-bottom: #ffeaf2;
      --card: rgba(255,255,255,0.92);
      --text: #223244;
      --muted: #5f6d7d;
      --accent: #3f7cff;
      --accent2: #ff6f91;
      --border: #dceaf7;
      --shadow: 0 20px 55px rgba(35, 58, 92, 0.12);
    }
    body.theme-pink {
      --bg-top: #fff2f7;
      --bg-bottom: #eaf6ff;
      --accent: #ff6f91;
      --accent2: #3f7cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Source Han Serif SC", "Noto Serif SC", "Songti SC", "SimSun", serif;
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
    }
    .topbar {
      max-width: 1100px;
      margin: 0 auto 18px;
      display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .theme-switch { display: flex; gap: 8px; }
    .theme-switch button, .topbar a, .panel button, .btn { border: none; cursor: pointer; }
    .theme-switch button {
      padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.8); color: var(--text); border: 1px solid var(--border); font-family: inherit;
    }
    .theme-switch button.active { background: var(--accent); color: white; }
    .topbar a {
      text-decoration: none; color: var(--accent); font-weight: 600; background: rgba(255,255,255,0.75); padding: 8px 12px; border-radius: 999px; border: 1px solid var(--border);
    }
    .shell { max-width: 1100px; margin: 0 auto; display: grid; gap: 18px; }
    .panel {
      background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; box-shadow: var(--shadow);
    }
    .clock { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; }
    .clock-meta { color: var(--muted); font-size: 0.95rem; margin-top: 8px; }
    .time-big { font-size: clamp(2rem, 4vw, 3rem); font-weight: 700; letter-spacing: 0.04em; }
    .muted { color: var(--muted); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
    .inputs input, .inputs button, .field input, .field textarea, .field select {
      width: 100%; border-radius: 12px; border: 1px solid var(--border); padding: 10px 12px; font: inherit; background: #fcfdff;
    }
    .field { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .btn { padding: 10px 14px; border-radius: 999px; font-weight: 600; color: white; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .btn.secondary { background: #f4f9ff; color: var(--text); border: 1px solid var(--border); }
    .status { margin-top: 12px; font-size: 1rem; color: var(--accent); font-weight: 600; }
    .laps { margin-top: 12px; display: grid; gap: 8px; }
    .lap-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: 12px; background: #f8fbff; border: 1px solid var(--border); }
    .pill { display: inline-flex; padding: 6px 10px; border-radius: 999px; background: rgba(63, 124, 255, 0.08); color: var(--accent); font-size: 0.86rem; margin-bottom: 10px; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } .inputs { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="theme-switch" role="toolbar" aria-label="主题切换">
      <button class="active" data-theme="sky" onclick="setTheme('sky')">天蓝</button>
      <button data-theme="pink" onclick="setTheme('pink')">浅粉</button>
    </div>
    <a href="../index.html">返回首页</a>
  </div>

  <div class="shell">
    <section class="panel">
      <div class="clock">
        <div>
          <div class="pill">当前时间</div>
          <div id="currentTime" class="time-big">--:--:--</div>
          <div id="currentDate" class="muted">--</div>
          <div id="timezoneInfo" class="clock-meta">正在获取时区信息…</div>
        </div>
      </div>
    </section>

    <div class="grid">
      <section class="panel">
        <div class="pill">计时器</div>
        <div class="field">
          <label>计时名称</label>
          <input id="timerName" placeholder="例如：阅读 30 分钟" />
        </div>
        <div class="inputs">
          <div class="field">
            <label>小时</label>
            <input id="hours" type="number" min="0" value="0" />
          </div>
          <div class="field">
            <label>分钟</label>
            <input id="minutes" type="number" min="0" max="59" value="10" />
          </div>
          <div class="field">
            <label>秒</label>
            <input id="seconds" type="number" min="0" max="59" value="0" />
          </div>
        </div>
        <div class="row">
          <button class="btn" onclick="startCountdown()">开始</button>
          <button class="btn secondary" onclick="pauseCountdown()">暂停</button>
          <button class="btn secondary" onclick="resetCountdown()">重置</button>
        </div>
        <div id="countdownStatus" class="status">等待开始</div>
      </section>

      <section class="panel">
        <div class="pill">秒表</div>
        <div id="stopwatchTime" class="time-big">00:00:00</div>
        <div class="row">
          <button class="btn" onclick="startStopwatch()">开始</button>
          <button class="btn secondary" onclick="pauseStopwatch()">暂停</button>
          <button class="btn secondary" onclick="lapStopwatch()">计次</button>
          <button class="btn secondary" onclick="resetStopwatch()">重置</button>
        </div>
        <div id="stopwatchStatus" class="status">准备就绪</div>
        <div class="laps" id="laps"></div>
      </section>
    </div>
  </div>

  <script>
    const currentTimeEl = document.getElementById('currentTime');
    const currentDateEl = document.getElementById('currentDate');
    const timezoneInfoEl = document.getElementById('timezoneInfo');
    const countdownStatusEl = document.getElementById('countdownStatus');
    const stopwatchTimeEl = document.getElementById('stopwatchTime');
    const stopwatchStatusEl = document.getElementById('stopwatchStatus');
    const lapsEl = document.getElementById('laps');

    function updateClock() {
      const now = new Date();
      currentTimeEl.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
      currentDateEl.textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

      const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || '本地时区';
      const offsetMinutes = -now.getTimezoneOffset();
      const sign = offsetMinutes >= 0 ? '+' : '-';
      const hourPart = String(Math.floor(Math.abs(offsetMinutes) / 60)).padStart(2, '0');
      const minutePart = String(Math.abs(offsetMinutes) % 60).padStart(2, '0');
      timezoneInfoEl.textContent = `${timeZone} · UTC${sign}${hourPart}:${minutePart}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    function setTheme(theme) {
      document.body.classList.toggle('theme-pink', theme === 'pink');
      document.querySelectorAll('.theme-switch button').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
      localStorage.setItem('site-theme', theme);
    }
    setTheme(localStorage.getItem('site-theme') || 'sky');

    let countdownTimer = null;
    let countdownRemaining = 0;
    let countdownRunning = false;

    function getCountdownSeconds() {
      const hours = Number(document.getElementById('hours').value) || 0;
      const minutes = Number(document.getElementById('minutes').value) || 0;
      const seconds = Number(document.getElementById('seconds').value) || 0;
      return hours * 3600 + minutes * 60 + seconds;
    }

    function formatTime(totalSeconds) {
      const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const s = String(totalSeconds % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function startCountdown() {
      if (countdownRunning) return;
      const name = document.getElementById('timerName').value.trim() || '倒计时';
      if (!countdownRemaining) {
        countdownRemaining = getCountdownSeconds();
      }
      if (!countdownRemaining) {
        countdownStatusEl.textContent = '请输入一个大于 0 的时长';
        return;
      }
      countdownRunning = true;
      countdownStatusEl.textContent = `${name} 开始：${formatTime(countdownRemaining)}`;
      countdownTimer = setInterval(() => {
        countdownRemaining -= 1;
        countdownStatusEl.textContent = `${name} 剩余：${formatTime(countdownRemaining)}`;
        if (countdownRemaining <= 0) {
          clearInterval(countdownTimer);
          countdownRunning = false;
          countdownRemaining = 0;
          countdownStatusEl.textContent = `${name} 已结束`;
          playAlarm();
          if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(`${name} 已结束`, { body: '时间到了，该休息或继续工作了。' });
          }
        }
      }, 1000);
    }

    function pauseCountdown() {
      if (!countdownRunning) return;
      clearInterval(countdownTimer);
      countdownRunning = false;
      countdownStatusEl.textContent = `已暂停：${formatTime(countdownRemaining)}`;
    }

    function resetCountdown() {
      clearInterval(countdownTimer);
      countdownRunning = false;
      countdownRemaining = 0;
      countdownStatusEl.textContent = '等待开始';
    }

    function playAlarm() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + 0.8);
      setTimeout(() => ctx.close(), 900);
      if ('Notification' in window && Notification.permission !== 'granted') {
        Notification.requestPermission();
      }
    }

    let stopwatchInterval = null;
    let stopwatchRunning = false;
    let stopwatchElapsed = 0;
    let lapCount = 0;

    function startStopwatch() {
      if (stopwatchRunning) return;
      stopwatchRunning = true;
      stopwatchStatusEl.textContent = '计时中';
      stopwatchInterval = setInterval(() => {
        stopwatchElapsed += 1;
        stopwatchTimeEl.textContent = formatTime(stopwatchElapsed);
      }, 1000);
    }

    function pauseStopwatch() {
      if (!stopwatchRunning) return;
      clearInterval(stopwatchInterval);
      stopwatchRunning = false;
      stopwatchStatusEl.textContent = '已暂停';
    }

    function lapStopwatch() {
      if (!stopwatchRunning) return;
      lapCount += 1;
      const item = document.createElement('div');
      item.className = 'lap-item';
      item.innerHTML = `<span>计次 ${lapCount}</span><strong>${formatTime(stopwatchElapsed)}</strong>`;
      lapsEl.prepend(item);
    }

    function resetStopwatch() {
      clearInterval(stopwatchInterval);
      stopwatchRunning = false;
      stopwatchElapsed = 0;
      lapCount = 0;
      stopwatchTimeEl.textContent = '00:00:00';
      stopwatchStatusEl.textContent = '准备就绪';
      lapsEl.innerHTML = '';
    }
  </script>
</body>
</html>
