<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点墨成匾 · 在线毛笔书写与印章生成</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE0C0;
    --paper-deep:#D9C79B;
    --ink:#1b1815;
    --seal:#a61b29;
    --seal-deep:#7e1220;
    --wood:#4a2e22;
    --wood-mid:#5e3a29;
    --wood-deep:#26150e;
    --brass:#c9a24b;
    --brass-light:#ecd694;
    --panel-bg:#faf6ec;
    --panel-line:#e3d8bd;
    --text-dark:#2b241d;
    --text-mute:#8a7c66;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, #3a281c 0%, #1c130d 55%, #120c08 100%);
    color:var(--text-dark);
    font-family:'Noto Serif SC', serif;
    min-height:100vh;
    padding:36px 20px 60px;
  }
  .app{max-width:1320px;margin:0 auto;}

  header{text-align:center;margin-bottom:30px;}
  header h1{
    font-family:'Ma Shan Zheng', cursive;
    font-size:clamp(2.4rem, 5vw, 3.6rem);
    color:var(--brass-light);
    margin:0 0 6px;
    letter-spacing:.12em;
    text-shadow:0 2px 10px rgba(0,0,0,.5);
  }
  header p{
    color:#cbb98a;
    font-size:.92rem;
    letter-spacing:.28em;
    margin:0;
    text-transform:none;
  }

  .layout{
    display:grid;
    grid-template-columns:1fr 336px;
    gap:26px;
    align-items:start;
  }
  @media (max-width:920px){
    .layout{grid-template-columns:1fr;}
  }

  /* ---------- Plaque stage (signature element) ---------- */
  .plaque-stage{display:flex;flex-direction:column;gap:16px;}

  .hanger{display:flex;justify-content:center;margin-bottom:-14px;}
  .hanger .ring{
    width:26px;height:26px;border-radius:50%;
    border:5px solid var(--brass);
    background:radial-gradient(circle at 35% 30%, var(--brass-light), var(--brass) 70%);
    box-shadow:0 3px 6px rgba(0,0,0,.5);
    z-index:2;
  }

  .plaque-frame{
    position:relative;
    padding:26px;
    border-radius:10px;
    background:
      repeating-linear-gradient(115deg, rgba(0,0,0,.08) 0 2px, transparent 2px 6px),
      linear-gradient(160deg, var(--wood-mid), var(--wood) 45%, var(--wood-deep) 100%);
    box-shadow:
      0 18px 44px rgba(0,0,0,.55),
      inset 0 0 0 2px rgba(201,162,75,.25),
      inset 0 0 30px rgba(0,0,0,.45);
  }
  .plaque-frame::before{
    content:"";
    position:absolute; inset:10px;
    border:1.5px solid rgba(201,162,75,.35);
    border-radius:6px;
    pointer-events:none;
  }
  .stud{
    position:absolute;
    width:15px;height:15px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--brass-light), var(--brass) 65%, #8a6a2d 100%);
    box-shadow:0 2px 3px rgba(0,0,0,.6), inset 0 0 2px rgba(255,255,255,.4);
  }
  .stud.tl{top:12px;left:12px;} .stud.tr{top:12px;right:12px;}
  .stud.bl{bottom:12px;left:12px;} .stud.br{bottom:12px;right:12px;}

  .canvas-wrap{
    position:relative;
    width:100%;
    max-width:1000px;
    aspect-ratio:1000/680;
    margin:0 auto;
    border-radius:3px;
    overflow:hidden;
    box-shadow:inset 0 0 18px rgba(0,0,0,.35);
    touch-action:none;
    cursor:crosshair;
  }
  .canvas-wrap canvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
  }
  #bgCanvas{z-index:1; pointer-events:none;}
  #inkCanvas{z-index:2;}

  .stage-toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
  }
  .stage-toolbar button{
    font-family:'Noto Serif SC', serif;
    font-size:.86rem;
    color:var(--brass-light);
    background:linear-gradient(160deg, #5e3a29, #3a2418);
    border:1px solid rgba(201,162,75,.4);
    padding:9px 18px;
    border-radius:20px;
    cursor:pointer;
    letter-spacing:.06em;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .stage-toolbar button:hover{transform:translateY(-1px); box-shadow:0 4px 10px rgba(0,0,0,.35);}
  .stage-toolbar button:disabled{opacity:.35; cursor:not-allowed; transform:none; box-shadow:none;}
  .stage-toolbar button.primary{
    background:linear-gradient(160deg, var(--brass-light), var(--brass));
    color:#382608; border-color:transparent; font-weight:600;
  }

  footer{
    text-align:center;
    color:#a4977a;
    font-size:.82rem;
    margin-top:26px;
    line-height:1.9;
    max-width:760px;
    margin-left:auto; margin-right:auto;
  }

  /* ---------- Control panel ---------- */
  .control-panel{
    background:var(--panel-bg);
    border-radius:10px;
    padding:22px 22px 26px;
    box-shadow:0 14px 34px rgba(0,0,0,.35);
    display:flex; flex-direction:column; gap:22px;
  }
  .panel-section h2{
    font-size:1rem;
    margin:0 0 14px;
    letter-spacing:.14em;
    color:var(--seal);
    display:flex; align-items:center; gap:8px;
  }
  .panel-section h2::after{
    content:"";
    flex:1; height:1px;
    background:var(--panel-line);
  }
  .field{margin-bottom:14px;}
  .field:last-child{margin-bottom:0;}
  .field label{
    display:flex; justify-content:space-between;
    font-size:.8rem; color:var(--text-mute);
    margin-bottom:6px; letter-spacing:.03em;
  }
  .field label span.val{color:var(--text-dark); font-variant-numeric:tabular-nums;}
  input[type=range]{
    width:100%; accent-color:var(--seal); cursor:pointer;
  }
  select, input[type=text]{
    width:100%;
    padding:8px 10px;
    border:1px solid var(--panel-line);
    border-radius:6px;
    background:#fff;
    font-family:'Noto Serif SC', serif;
    font-size:.88rem;
    color:var(--text-dark);
  }
  .swatches{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .swatch{
    width:26px; height:26px; border-radius:50%;
    border:2px solid transparent; cursor:pointer;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);
  }
  .swatch.active{border-color:var(--seal);}
  .swatch.custom{
    display:flex; align-items:center; justify-content:center;
    background:#fff; font-size:.6rem; color:var(--text-mute);
    border:1px dashed var(--panel-line); position:relative; overflow:hidden;
  }
  .swatch.custom input{
    position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
  }
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .toggle-group{display:flex; gap:8px;}
  .toggle-group button{
    flex:1;
    padding:8px 6px;
    font-size:.8rem;
    border:1px solid var(--panel-line);
    background:#fff;
    border-radius:6px;
    cursor:pointer;
    font-family:'Noto Serif SC', serif;
    color:var(--text-mute);
  }
  .toggle-group button.active{
    background:var(--seal); border-color:var(--seal); color:#fff;
  }
  .checkline{display:flex; align-items:center; gap:8px; font-size:.82rem; color:var(--text-mute);}

  .seal-preview-wrap{
    display:flex; flex-direction:column; align-items:center; gap:10px;
    padding:14px 0 4px;
  }
  #sealCanvas{
    width:150px; height:150px;
    background:
      repeating-conic-gradient(#f3ede0 0% 25%, #ece3d0 0% 50%) 50%/16px 16px;
    border-radius:8px;
    box-shadow:inset 0 0 0 1px var(--panel-line);
  }
  .panel-actions{display:flex; gap:10px;}
  .panel-actions button{
    flex:1;
    padding:10px 8px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-family:'Noto Serif SC', serif;
    font-size:.85rem;
    letter-spacing:.04em;
  }
  .btn-stamp{background:var(--seal); color:#fff; font-weight:600;}
  .btn-stamp:hover{background:var(--seal-deep);}

  /* ---------- Seal token on plaque ---------- */
  .seal-token{
    position:absolute;
    z-index:5;
    touch-action:none;
    cursor:grab;
  }
  .seal-token img{width:100%; height:100%; display:block; pointer-events:none; user-select:none;}
  .seal-token .handle{
    position:absolute;
    width:18px; height:18px;
    border-radius:50%;
    background:#fff;
    border:2px solid var(--seal);
    opacity:0; transition:opacity .15s ease;
  }
  .seal-token:hover .handle, .seal-token.active .handle{opacity:1;}
  .seal-token .rotate-handle{top:-26px; left:50%; transform:translateX(-50%); cursor:grab;}
  .seal-token .resize-handle{bottom:-8px; right:-8px; cursor:nwse-resize;}
  .seal-token .del-handle{
    top:-8px; right:-8px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; color:var(--seal); line-height:1;
  }
</style>
</head>
<body>
  <a href="../index.html" style="position:fixed;top:16px;left:16px;z-index:999;background:rgba(255,255,255,0.9);padding:6px 10px;border-radius:8px;border:1px solid rgba(0,0,0,0.06);text-decoration:none;color:var(--text-dark);font-size:14px">返回首页</a>
<div class="app">
  <header>
    <h1>点墨成匾</h1>
    <p>在线毛笔书写 · 匾额定制 · 印章生成</p>
  </header>

  <main class="layout">
    <section class="plaque-stage">
      <div class="hanger"><div class="ring"></div></div>
      <div class="plaque-frame">
        <span class="stud tl"></span><span class="stud tr"></span>
        <span class="stud bl"></span><span class="stud br"></span>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="bgCanvas"></canvas>
          <canvas id="inkCanvas"></canvas>
        </div>
      </div>
      <div class="stage-toolbar">
        <button id="btnUndo">← 撤销</button>
        <button id="btnRedo">重做 →</button>
        <button id="btnClear">清空</button>
        <button id="btnGridToggle">网格：无</button>
        <button id="btnExport" class="primary">导出图片</button>
      </div>
    </section>

    <aside class="control-panel">
      <div class="panel-section brush-section">
        <h2>笔墨</h2>

        <div class="field">
          <label>笔锋粗细 <span class="val" id="valBrushSize">34</span></label>
          <input type="range" id="brushSize" min="8" max="70" value="34">
        </div>

        <div class="field">
          <label>墨色浓度 <span class="val" id="valOpacity">92%</span></label>
          <input type="range" id="inkOpacity" min="40" max="100" value="92">
        </div>

        <div class="field">
          <label>枯笔飞白 <span class="val" id="valDryness">15%</span></label>
          <input type="range" id="dryness" min="0" max="100" value="15">
        </div>

        <div class="field">
          <label>墨色</label>
          <div class="swatches" id="inkSwatches">
            <span class="swatch active" data-color="#1b1815" style="background:#1b1815" title="墨黑"></span>
            <span class="swatch" data-color="#a61b29" style="background:#a61b29" title="朱红"></span>
            <span class="swatch" data-color="#c9a24b" style="background:#c9a24b" title="泥金"></span>
            <span class="swatch" data-color="#3f6b52" style="background:#3f6b52" title="石绿"></span>
            <span class="swatch custom" title="自定义">
              自定<input type="color" id="customColor" value="#1b1815">
            </span>
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label>匾底材质</label>
            <select id="paperMaterial">
              <option value="xuan">宣纸本色</option>
              <option value="zhu">朱漆金字</option>
              <option value="hei">黑漆描金</option>
            </select>
          </div>
          <div class="field">
            <label>练习格</label>
            <select id="gridType">
              <option value="none">无</option>
              <option value="tian">田字格</option>
              <option value="mi">米字格</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>格子大小 <span class="val" id="valGridCell">120</span></label>
          <input type="range" id="gridCell" min="60" max="220" value="120">
        </div>
      </div>

      <div class="panel-section seal-section">
        <h2>印章</h2>

        <div class="field">
          <label>印文（限六字以内）</label>
          <input type="text" id="sealText" value="手书" maxlength="6">
        </div>

        <div class="row2">
          <div class="field">
            <label>形状</label>
            <div class="toggle-group" id="sealShapeGroup">
              <button data-v="square" class="active">方形</button>
              <button data-v="round">圆形</button>
            </div>
          </div>
          <div class="field">
            <label>刻法</label>
            <div class="toggle-group" id="sealModeGroup">
              <button data-v="zhu" class="active">朱文</button>
              <button data-v="bai">白文</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label>排列方式</label>
          <select id="sealLayout">
            <option value="column">竖排单列</option>
            <option value="row">横排单行</option>
            <option value="grid">田字排列</option>
          </select>
        </div>

        <div class="field checkline">
          <input type="checkbox" id="sealBorder" checked>
          <label for="sealBorder" style="margin:0;">显示边框</label>
        </div>

        <div class="field">
          <label>做旧程度 <span class="val" id="valAge">35%</span></label>
          <input type="range" id="sealAge" min="0" max="100" value="35">
        </div>

        <div class="field">
          <label>盖印尺寸 <span class="val" id="valSealSize">140</span></label>
          <input type="range" id="sealSize" min="60" max="260" value="140">
        </div>

        <div class="seal-preview-wrap">
          <canvas id="sealCanvas" width="260" height="260"></canvas>
        </div>

        <div class="panel-actions">
          <button class="btn-stamp" id="btnStamp">盖章至匾额</button>
        </div>
      </div>
    </aside>
  </main>

  <footer>
    提示：书写速度会影响笔画粗细 — 慢笔沉稳厚重，快笔出锋细挺，可反复练习体会运笔节奏。<br>
    印章生成后点击"盖章至匾额"，图章会出现在匾心，可直接拖动移动位置；顶部圆点可旋转，右下角圆点可缩放；导出图片会将书写与印章一并合成。
  </footer>
</div>

<script>
(function(){
  "use strict";

  var DW = 1000, DH = 680;

  var bgCanvas = document.getElementById('bgCanvas');
  var inkCanvas = document.getElementById('inkCanvas');
  var canvasWrap = document.getElementById('canvasWrap');
  var sealCanvas = document.getElementById('sealCanvas');

  var bctx, ictx, sctx;

  var settings = {
    brushSize: 34,
    opacity: 0.92,
    dryness: 0.15,
    inkColor: '#1b1815',
    paper: 'xuan',
    gridType: 'none',
    gridCell: 120
  };

  var sealSettings = {
    text: '手书',
    shape: 'square',
    mode: 'zhu',
    layout: 'column',
    border: true,
    age: 0.35
  };

  var placedSeals = [];
  var sealCounter = 0;
  var historyStack = [];
  var redoStack = [];

  var PAPER_MATERIALS = {
    xuan: { base:'#EDE0C0', deep:'#D9C79B', fiber:'#c4b083', grid:'rgba(166,27,41,0.42)' },
    zhu:  { base:'#9c1c26', deep:'#701019', fiber:'#c9505d', grid:'rgba(201,162,75,0.55)' },
    hei:  { base:'#161311', deep:'#0a0908', fiber:'#3c332b', grid:'rgba(201,162,75,0.5)' }
  };

  var PAPER_DEFAULT_INK = { xuan:'#1b1815', zhu:'#c9a24b', hei:'#c9a24b' };

  /* ---------------- helpers ---------------- */

  function hexToRgb(hex){
    hex = hex.replace('#','');
    if(hex.length === 3){ hex = hex.split('').map(function(c){return c+c;}).join(''); }
    var num = parseInt(hex, 16);
    return { r:(num>>16)&255, g:(num>>8)&255, b:num&255 };
  }

  function setupCanvas(canvas){
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = DW * dpr;
    canvas.height = DH * dpr;
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return ctx;
  }

  function getLogicalPos(e, canvas){
    var rect = canvas.getBoundingClientRect();
    var scaleX = DW / rect.width;
    var scaleY = DH / rect.height;
    return { x:(e.clientX - rect.left) * scaleX, y:(e.clientY - rect.top) * scaleY };
  }

  /* ---------------- background & grid ---------------- */

  function drawGrid(ctx, w, h, cell, type, color){
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.5;
    var x;
    for(x = 0; x <= w; x += cell){
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
    }
    var y;
    for(y = 0; y <= h; y += cell){
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    }
    if(type === 'mi'){
      ctx.globalAlpha = 0.32;
      for(x = 0; x < w; x += cell){
        for(y = 0; y < h; y += cell){
          ctx.beginPath();
          ctx.moveTo(x, y); ctx.lineTo(x+cell, y+cell);
          ctx.moveTo(x+cell, y); ctx.lineTo(x, y+cell);
          ctx.moveTo(x+cell/2, y); ctx.lineTo(x+cell/2, y+cell);
          ctx.moveTo(x, y+cell/2); ctx.lineTo(x+cell, y+cell/2);
          ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

  function renderBackground(){
    var w = DW, h = DH;
    bctx.clearRect(0, 0, w, h);
    var m = PAPER_MATERIALS[settings.paper];
    var g = bctx.createLinearGradient(0, 0, w, h);
    g.addColorStop(0, m.base);
    g.addColorStop(1, m.deep);
    bctx.fillStyle = g;
    bctx.fillRect(0, 0, w, h);

    bctx.save();
    bctx.globalAlpha = 0.10;
    bctx.strokeStyle = m.fiber;
    bctx.lineWidth = 1;
    for(var i = 0; i < 900; i++){
      var fx = Math.random() * w, fy = Math.random() * h;
      var len = 6 + Math.random() * 18;
      var ang = Math.random() * Math.PI;
      bctx.beginPath();
      bctx.moveTo(fx, fy);
      bctx.lineTo(fx + Math.cos(ang)*len, fy + Math.sin(ang)*len);
      bctx.stroke();
    }
    bctx.restore();

    if(settings.gridType !== 'none'){
      drawGrid(bctx, w, h, settings.gridCell, settings.gridType, m.grid);
    }
  }

  /* ---------------- brush engine ---------------- */

  var drawState = { drawing:false, x:0, y:0, w:0, t:0, pointerId:null };

  function computeWidth(speed){
    var base = settings.brushSize;
    var minW = base * 0.22;
    var maxW = base * 1.05;
    var factor = 1 / (1 + speed * 0.9);
    factor = Math.min(1, Math.max(0, factor));
    return minW + (maxW - minW) * factor;
  }

  function stampBrush(x, y, w){
    var r = Math.max(0.6, w/2);
    var jx = (Math.random()-0.5) * r * 0.06;
    var jy = (Math.random()-0.5) * r * 0.06;
    var c = hexToRgb(settings.inkColor);
    var baseAlpha = settings.opacity * (0.88 + Math.random()*0.12);

    ictx.save();
    var grad = ictx.createRadialGradient(x+jx, y+jy, 0, x+jx, y+jy, r);
    grad.addColorStop(0, 'rgba('+c.r+','+c.g+','+c.b+','+baseAlpha+')');
    grad.addColorStop(0.72, 'rgba('+c.r+','+c.g+','+c.b+','+(baseAlpha*0.9)+')');
    grad.addColorStop(1, 'rgba('+c.r+','+c.g+','+c.b+',0)');
    ictx.fillStyle = grad;
    ictx.beginPath();
    ictx.arc(x+jx, y+jy, r, 0, Math.PI*2);
    ictx.fill();

    if(settings.dryness > 0 && Math.random() < settings.dryness * 0.55){
      for(var i = 0; i < 3; i++){
        var ang = Math.random() * Math.PI * 2;
        var rad = r * (0.55 + Math.random()*0.6);
        var sx = x + Math.cos(ang)*rad, sy = y + Math.sin(ang)*rad;
        var sr = r * (0.08 + Math.random()*0.12);
        ictx.globalAlpha = baseAlpha * 0.5 * Math.random();
        ictx.fillStyle = settings.inkColor;
        ictx.beginPath();
        ictx.arc(sx, sy, sr, 0, Math.PI*2);
        ictx.fill();
      }
    }
    ictx.restore();
  }

  function drawSegment(x0,y0,x1,y1,w0,w1){
    var dist = Math.hypot(x1-x0, y1-y0);
    var steps = Math.max(1, Math.ceil(dist/2.2));
    for(var i=1;i<=steps;i++){
      var t = i/steps;
      stampBrush(x0+(x1-x0)*t, y0+(y1-y0)*t, w0+(w1-w0)*t);
    }
  }

  function pushHistory(){
    historyStack.push(inkCanvas.toDataURL());
    if(historyStack.length > 25) historyStack.shift();
    redoStack.length = 0;
    updateHistoryButtons();
  }

  function restoreDataURL(url){
    if(!url){
      ictx.clearRect(0,0,DW,DH);
      return;
    }
    var img = new Image();
    img.onload = function(){
      ictx.clearRect(0,0,DW,DH);
      ictx.drawImage(img,0,0,DW,DH);
    };
    img.src = url;
  }

  function undo(){
    if(!historyStack.length) return;
    redoStack.push(inkCanvas.toDataURL());
    var prev = historyStack.pop();
    restoreDataURL(prev);
    updateHistoryButtons();
  }

  function redo(){
    if(!redoStack.length) return;
    historyStack.push(inkCanvas.toDataURL());
    var next = redoStack.pop();
    restoreDataURL(next);
    updateHistoryButtons();
  }

  function updateHistoryButtons(){
    document.getElementById('btnUndo').disabled = historyStack.length === 0;
    document.getElementById('btnRedo').disabled = redoStack.length === 0;
  }

  function clearCanvas(){
    pushHistory();
    ictx.clearRect(0,0,DW,DH);
  }

  function bindBrushEvents(){
    inkCanvas.addEventListener('pointerdown', function(e){
      e.preventDefault();
      inkCanvas.setPointerCapture(e.pointerId);
      pushHistory();
      drawState.drawing = true;
      drawState.pointerId = e.pointerId;
      var p = getLogicalPos(e, inkCanvas);
      drawState.x = p.x; drawState.y = p.y;
      drawState.w = settings.brushSize * 0.6;
      drawState.t = performance.now();
      stampBrush(p.x, p.y, drawState.w * 1.15);
    });

    inkCanvas.addEventListener('pointermove', function(e){
      if(!drawState.drawing) return;
      var p = getLogicalPos(e, inkCanvas);
      var now = performance.now();
      var dt = Math.max(now - drawState.t, 1);
      var dist = Math.hypot(p.x - drawState.x, p.y - drawState.y);
      if(dist < 0.5) return;
      var speed = dist / dt;
      var target = computeWidth(speed);
      var newW = drawState.w * 0.55 + target * 0.45;
      drawSegment(drawState.x, drawState.y, p.x, p.y, drawState.w, newW);
      drawState.x = p.x; drawState.y = p.y; drawState.w = newW; drawState.t = now;
    });

    function endStroke(e){
      if(!drawState.drawing) return;
      drawState.drawing = false;
      try{ inkCanvas.releasePointerCapture(e.pointerId); }catch(err){}
    }
    inkCanvas.addEventListener('pointerup', endStroke);
    inkCanvas.addEventListener('pointerleave', endStroke);
    inkCanvas.addEventListener('pointercancel', endStroke);
  }

  /* ---------------- seal generation ---------------- */

  function buildShapePath(shape, cx, cy, size, jitterFactor){
    var path = new Path2D();
    if(shape === 'round'){
      var rBase = size/2;
      var steps = 56;
      for(var i=0;i<=steps;i++){
        var ang = (i/steps) * Math.PI * 2;
        var jitter = 1 + (Math.random()-0.5) * 0.02 * jitterFactor;
        var r = rBase * jitter;
        var x = cx + Math.cos(ang)*r, y = cy + Math.sin(ang)*r;
        if(i===0) path.moveTo(x,y); else path.lineTo(x,y);
      }
      path.closePath();
    } else {
      var half = size/2;
      var corners = [[-half,-half],[half,-half],[half,half],[-half,half]];
      corners.forEach(function(c, idx){
        var jx = (Math.random()-0.5) * size * 0.018 * jitterFactor;
        var jy = (Math.random()-0.5) * size * 0.018 * jitterFactor;
        var x = cx + c[0] + jx, y = cy + c[1] + jy;
        if(idx===0) path.moveTo(x,y); else path.lineTo(x,y);
      });
      path.closePath();
    }
    return path;
  }

  function charPositions(n, layout, cx, cy, innerSize){
    var pos = [];
    var cellW, cellH, i;
    if(layout === 'row'){
      cellW = innerSize/n; cellH = innerSize;
      for(i=0;i<n;i++){
        pos.push({
          x: cx + innerSize/2 - cellW*(i+0.5),
          y: cy,
          fs: Math.min(cellW, cellH) * 0.74
        });
      }
    } else if(layout === 'grid' && n > 1){
      var rows = Math.ceil(n/2), cols = 2;
      cellW = innerSize/cols; cellH = innerSize/rows;
      for(i=0;i<n;i++){
        var colFromRight = Math.floor(i/rows);
        var rowIdx = i % rows;
        var col = cols - 1 - colFromRight;
        pos.push({
          x: cx - innerSize/2 + cellW*(col+0.5),
          y: cy - innerSize/2 + cellH*(rowIdx+0.5),
          fs: Math.min(cellW, cellH) * 0.72
        });
      }
    } else {
      cellW = innerSize; cellH = innerSize/n;
      for(i=0;i<n;i++){
        pos.push({
          x: cx,
          y: cy - innerSize/2 + cellH*(i+0.5),
          fs: Math.min(cellW/1.3, cellH) * 0.78
        });
      }
    }
    return pos;
  }

  function drawSealText(ctx, cx, cy, size, chars, layout){
    var padding = size * 0.13;
    var innerSize = size - padding*2;
    var positions = charPositions(chars.length, layout, cx, cy, innerSize);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    chars.forEach(function(ch, idx){
      var p = positions[idx];
      ctx.font = '900 ' + p.fs + 'px "Noto Serif SC", serif';
      ctx.fillText(ch, p.x, p.y);
    });
  }

  function applyAging(ctx, w, h, amount){
    if(amount <= 0) return;
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    var n = Math.floor(70 * amount);
    for(var i=0;i<n;i++){
      var x = Math.random()*w, y = Math.random()*h;
      var r = 1 + Math.random()*4*amount;
      ctx.globalAlpha = 0.35 + Math.random()*0.5;
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function generateSeal(){
    var w = sealCanvas.width, h = sealCanvas.height;
    sctx.setTransform(1,0,0,1,0,0);
    sctx.clearRect(0,0,w,h);
    var cx = w/2, cy = h/2;
    var size = Math.min(w,h) * 0.84;
    var jitterFactor = 1 + sealSettings.age * 1.5;

    var rawChars = Array.from(sealSettings.text.trim());
    if(rawChars.length === 0) rawChars = ['印'];
    if(rawChars.length > 6) rawChars = rawChars.slice(0,6);

    var shapePath = buildShapePath(sealSettings.shape, cx, cy, size, jitterFactor);
    var SEAL_RED = '#a61b29';

    if(sealSettings.mode === 'bai'){
      sctx.save();
      sctx.fillStyle = SEAL_RED;
      sctx.fill(shapePath);
      sctx.restore();

      if(sealSettings.border){
        sctx.save();
        sctx.strokeStyle = 'rgba(255,255,255,0.35)';
        sctx.lineWidth = size * 0.02;
        sctx.stroke(shapePath);
        sctx.restore();
      }

      sctx.save();
      sctx.globalCompositeOperation = 'destination-out';
      sctx.fillStyle = 'rgba(0,0,0,1)';
      drawSealText(sctx, cx, cy, size, rawChars, sealSettings.layout);
      sctx.restore();
    } else {
      sctx.save();
      if(sealSettings.border){
        sctx.lineWidth = size * 0.045;
        sctx.strokeStyle = SEAL_RED;
        sctx.stroke(shapePath);
      }
      sctx.fillStyle = SEAL_RED;
      drawSealText(sctx, cx, cy, size, rawChars, sealSettings.layout);
      sctx.restore();
    }

    applyAging(sctx, w, h, sealSettings.age);
  }

  /* ---------------- placed seal tokens ---------------- */

  function stampToPlaque(){
    var dataUrl = sealCanvas.toDataURL('image/png');
    var img = new Image();
    img.onload = function(){
      var wrapRect = canvasWrap.getBoundingClientRect();
      var size = parseInt(document.getElementById('sealSize').value, 10);
      var seal = {
        id: 's' + (++sealCounter),
        img: img,
        cx: wrapRect.width/2,
        cy: wrapRect.height/2,
        size: size,
        rot: 0
      };
      placedSeals.push(seal);
      renderToken(seal);
    };
    img.src = dataUrl;
  }

  function renderToken(seal){
    var token = document.createElement('div');
    token.className = 'seal-token';
    token.dataset.id = seal.id;
    token.style.width = seal.size + 'px';
    token.style.height = seal.size + 'px';

    var imgEl = document.createElement('img');
    imgEl.src = seal.img.src;
    token.appendChild(imgEl);

    var rotateHandle = document.createElement('div');
    rotateHandle.className = 'handle rotate-handle';
    token.appendChild(rotateHandle);

    var resizeHandle = document.createElement('div');
    resizeHandle.className = 'handle resize-handle';
    token.appendChild(resizeHandle);

    var delHandle = document.createElement('div');
    delHandle.className = 'handle del-handle';
    delHandle.textContent = '×';
    token.appendChild(delHandle);

    canvasWrap.appendChild(token);
    positionToken(seal, token);
    attachTokenInteractions(seal, token, rotateHandle, resizeHandle, delHandle);
  }

  function positionToken(seal, token){
    token.style.left = seal.cx + 'px';
    token.style.top = seal.cy + 'px';
    token.style.width = seal.size + 'px';
    token.style.height = seal.size + 'px';
    token.style.transform = 'translate(-50%, -50%) rotate(' + seal.rot + 'deg)';
  }

  function attachTokenInteractions(seal, token, rotateHandle, resizeHandle, delHandle){
    var dragging = false, dragOffX = 0, dragOffY = 0;

    token.addEventListener('pointerdown', function(e){
      if(e.target === rotateHandle || e.target === resizeHandle || e.target === delHandle) return;
      e.stopPropagation();
      token.setPointerCapture(e.pointerId);
      token.classList.add('active');
      var wrapRect = canvasWrap.getBoundingClientRect();
      dragging = true;
      dragOffX = (e.clientX - wrapRect.left) - seal.cx;
      dragOffY = (e.clientY - wrapRect.top) - seal.cy;
    });
    token.addEventListener('pointermove', function(e){
      if(!dragging) return;
      var wrapRect = canvasWrap.getBoundingClientRect();
      seal.cx = (e.clientX - wrapRect.left) - dragOffX;
      seal.cy = (e.clientY - wrapRect.top) - dragOffY;
      positionToken(seal, token);
    });
    function stopDrag(e){
      dragging = false;
      try{ token.releasePointerCapture(e.pointerId); }catch(err){}
    }
    token.addEventListener('pointerup', stopDrag);
    token.addEventListener('pointercancel', stopDrag);

    var rotating = false, startAngle = 0, startRot = 0;
    rotateHandle.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      rotateHandle.setPointerCapture(e.pointerId);
      rotating = true;
      var wrapRect = canvasWrap.getBoundingClientRect();
      var px = e.clientX - wrapRect.left, py = e.clientY - wrapRect.top;
      startAngle = Math.atan2(py - seal.cy, px - seal.cx) * 180/Math.PI;
      startRot = seal.rot;
    });
    rotateHandle.addEventListener('pointermove', function(e){
      if(!rotating) return;
      var wrapRect = canvasWrap.getBoundingClientRect();
      var px = e.clientX - wrapRect.left, py = e.clientY - wrapRect.top;
      var ang = Math.atan2(py - seal.cy, px - seal.cx) * 180/Math.PI;
      seal.rot = startRot + (ang - startAngle) + 90;
      positionToken(seal, token);
    });
    function stopRotate(e){
      rotating = false;
      try{ rotateHandle.releasePointerCapture(e.pointerId); }catch(err){}
    }
    rotateHandle.addEventListener('pointerup', stopRotate);
    rotateHandle.addEventListener('pointercancel', stopRotate);

    var resizing = false, startDist = 0, startSize = 0;
    resizeHandle.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      resizeHandle.setPointerCapture(e.pointerId);
      resizing = true;
      var wrapRect = canvasWrap.getBoundingClientRect();
      var px = e.clientX - wrapRect.left, py = e.clientY - wrapRect.top;
      startDist = Math.hypot(px - seal.cx, py - seal.cy);
      startSize = seal.size;
    });
    resizeHandle.addEventListener('pointermove', function(e){
      if(!resizing) return;
      var wrapRect = canvasWrap.getBoundingClientRect();
      var px = e.clientX - wrapRect.left, py = e.clientY - wrapRect.top;
      var dist = Math.hypot(px - seal.cx, py - seal.cy);
      var newSize = startSize + (dist - startDist) * 1.4;
      seal.size = Math.max(40, Math.min(420, newSize));
      positionToken(seal, token);
    });
    function stopResize(e){
      resizing = false;
      try{ resizeHandle.releasePointerCapture(e.pointerId); }catch(err){}
    }
    resizeHandle.addEventListener('pointerup', stopResize);
    resizeHandle.addEventListener('pointercancel', stopResize);

    delHandle.addEventListener('pointerdown', function(e){
      e.stopPropagation();
      placedSeals = placedSeals.filter(function(s){ return s.id !== seal.id; });
      token.remove();
    });
  }

  /* ---------------- export ---------------- */

  function exportImage(){
    var tmp = document.createElement('canvas');
    tmp.width = inkCanvas.width;
    tmp.height = inkCanvas.height;
    var tctx = tmp.getContext('2d');
    tctx.drawImage(bgCanvas, 0, 0);
    tctx.drawImage(inkCanvas, 0, 0);

    var wrapRect = canvasWrap.getBoundingClientRect();
    var scaleX = inkCanvas.width / wrapRect.width;
    var scaleY = inkCanvas.height / wrapRect.height;

    placedSeals.forEach(function(seal){
      var cxC = seal.cx * scaleX, cyC = seal.cy * scaleY;
      var wC = seal.size * scaleX, hC = seal.size * scaleY;
      tctx.save();
      tctx.translate(cxC, cyC);
      tctx.rotate(seal.rot * Math.PI/180);
      tctx.drawImage(seal.img, -wC/2, -hC/2, wC, hC);
      tctx.restore();
    });

    var url = tmp.toDataURL('image/png');
    var a = document.createElement('a');
    a.href = url;
    a.download = '牌匾书法.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  /* ---------------- UI wiring ---------------- */

  function bindUI(){
    var brushSize = document.getElementById('brushSize');
    brushSize.addEventListener('input', function(){
      settings.brushSize = parseInt(brushSize.value, 10);
      document.getElementById('valBrushSize').textContent = brushSize.value;
    });

    var inkOpacity = document.getElementById('inkOpacity');
    inkOpacity.addEventListener('input', function(){
      settings.opacity = parseInt(inkOpacity.value, 10) / 100;
      document.getElementById('valOpacity').textContent = inkOpacity.value + '%';
    });

    var dryness = document.getElementById('dryness');
    dryness.addEventListener('input', function(){
      settings.dryness = parseInt(dryness.value, 10) / 100;
      document.getElementById('valDryness').textContent = dryness.value + '%';
    });

    var swatches = document.querySelectorAll('#inkSwatches .swatch[data-color]');
    swatches.forEach(function(sw){
      sw.addEventListener('click', function(){
        settings.inkColor = sw.dataset.color;
        swatches.forEach(function(s){ s.classList.remove('active'); });
        sw.classList.add('active');
      });
    });
    document.getElementById('customColor').addEventListener('input', function(e){
      settings.inkColor = e.target.value;
      swatches.forEach(function(s){ s.classList.remove('active'); });
    });

    var paperMaterial = document.getElementById('paperMaterial');
    paperMaterial.addEventListener('change', function(){
      settings.paper = paperMaterial.value;
      settings.inkColor = PAPER_DEFAULT_INK[settings.paper];
      swatches.forEach(function(s){
        s.classList.toggle('active', s.dataset.color === settings.inkColor);
      });
      renderBackground();
    });

    var gridType = document.getElementById('gridType');
    gridType.addEventListener('change', function(){
      settings.gridType = gridType.value;
      document.getElementById('btnGridToggle').textContent =
        '网格：' + (gridType.value === 'none' ? '无' : gridType.options[gridType.selectedIndex].text);
      renderBackground();
    });

    var gridCell = document.getElementById('gridCell');
    gridCell.addEventListener('input', function(){
      settings.gridCell = parseInt(gridCell.value, 10);
      document.getElementById('valGridCell').textContent = gridCell.value;
      renderBackground();
    });

    document.getElementById('btnGridToggle').addEventListener('click', function(){
      var order = ['none','tian','mi'];
      var idx = (order.indexOf(settings.gridType) + 1) % order.length;
      settings.gridType = order[idx];
      gridType.value = settings.gridType;
      this.textContent = '网格：' + gridType.options[gridType.selectedIndex].text;
      renderBackground();
    });

    document.getElementById('btnUndo').addEventListener('click', undo);
    document.getElementById('btnRedo').addEventListener('click', redo);
    document.getElementById('btnClear').addEventListener('click', clearCanvas);
    document.getElementById('btnExport').addEventListener('click', exportImage);

    /* seal controls */
    var sealText = document.getElementById('sealText');
    sealText.addEventListener('input', function(){
      sealSettings.text = sealText.value;
      generateSeal();
    });

    function bindToggleGroup(id, target, key){
      var group = document.getElementById(id);
      var buttons = group.querySelectorAll('button');
      buttons.forEach(function(btn){
        btn.addEventListener('click', function(){
          target[key] = btn.dataset.v;
          buttons.forEach(function(b){ b.classList.remove('active'); });
          btn.classList.add('active');
          generateSeal();
        });
      });
    }
    bindToggleGroup('sealShapeGroup', sealSettings, 'shape');
    bindToggleGroup('sealModeGroup', sealSettings, 'mode');

    document.getElementById('sealLayout').addEventListener('change', function(e){
      sealSettings.layout = e.target.value;
      generateSeal();
    });
    document.getElementById('sealBorder').addEventListener('change', function(e){
      sealSettings.border = e.target.checked;
      generateSeal();
    });
    var sealAge = document.getElementById('sealAge');
    sealAge.addEventListener('input', function(){
      sealSettings.age = parseInt(sealAge.value, 10) / 100;
      document.getElementById('valAge').textContent = sealAge.value + '%';
      generateSeal();
    });
    var sealSize = document.getElementById('sealSize');
    sealSize.addEventListener('input', function(){
      document.getElementById('valSealSize').textContent = sealSize.value;
    });

    document.getElementById('btnStamp').addEventListener('click', stampToPlaque);
  }

  /* ---------------- init ---------------- */

  function init(){
    bctx = setupCanvas(bgCanvas);
    ictx = setupCanvas(inkCanvas);
    sctx = sealCanvas.getContext('2d');

    renderBackground();
    bindBrushEvents();
    bindUI();
    updateHistoryButtons();

    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(function(){ generateSeal(); });
    }
    generateSeal();

    window.addEventListener('resize', function(){
      /* placed seal tokens keep their wrap-local px position automatically via CSS reflow */
    });
  }

  init();
})();
</script>
</body>
